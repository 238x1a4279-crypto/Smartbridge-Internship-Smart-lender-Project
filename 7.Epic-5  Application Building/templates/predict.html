<!DOCTYPE html>
<html>
<head>
    <title>Loan Prediction</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
        }

        .container{
            width:700px;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
            color:#2c3e50;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        input[type="submit"]{
            margin-top:20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:18px;
        }

        input[type="submit"]:hover{
            background:darkgreen;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Enter Loan Details</h2>

<form action="/submit" method="POST">

<label>Gender</label>
<select name="Gender">
<option value="1">Male</option>
<option value="0">Female</option>
</select>

<label>Married</label>
<select name="Married">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Dependents</label>
<input type="number" name="Dependents" required>

<label>Education</label>
<select name="Education">
<option value="0">Graduate</option>
<option value="1">Not Graduate</option>
</select>

<label>Self Employed</label>
<select name="Self_Employed">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

<label>Applicant Income</label>
<input type="number" name="ApplicantIncome" required>

<label>Coapplicant Income</label>
<input type="number" name="CoapplicantIncome" required>

<label>Loan Amount</label>
<input type="number" name="LoanAmount" required>

<label>Loan Amount Term</label>
<input type="number" name="Loan_Amount_Term" required>

<label>Credit History</label>
<select name="Credit_History">
<option value="1">Good</option>
<option value="0">Bad</option>
</select>

<label>Property Area</label>
<select name="Property_Area">
<option value="0">Urban</option>
<option value="1">Semiurban</option>
<option value="2">Rural</option>
</select>

<input type="submit" value="Predict Loan">

</form>

</div>

</body>
</html>
